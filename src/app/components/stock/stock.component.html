<div class="stock">
  <div class="pile" (click)="flip()">
    <div class="bottom"></div>
    @for (card of cards(); track $index) {
      <app-card [card]="card"></app-card>
    }
  </div>
  <div class="pile">
    @for (card of open(); track $index) {
      <app-card
        [card]="open()[open().length - 1 - $index]"
        [appDrag]="$last"
        (appDragStart)="dragging.set([id(), [open()[0]]])"
        (dblclick)="toFoundation.emit([id(), open()[0]])"
      ></app-card>
    }
  </div>
</div>
