<div class="pile" (appDrop)="canPlace() && dropped.emit(id())">
  <div class="empty"></div>
  @for (card of cards(); track $index) {
    <div
      class="card_container"
      [appDrag]="$last"
      [appDragIndex]="$index + 1"
      (appDragStart)="dragstart()"
      (appDragEnd)="dragging.set(undefined)"
    >
      <app-card [card]="card"></app-card>
    </div>
  }
</div>
