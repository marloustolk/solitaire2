<app-menu
  (newGame)="newGame()"
  (restart)="restart()"
  (undo)="undo()"
  [notStarted]="moves.length === 0"
></app-menu>
<div class="board">
  <div class="card_row top">
    <app-stock
      [id]="OPEN_STOCK"
      [(cards)]="playingCards[CLOSED_STOCK]"
      [(open)]="playingCards[OPEN_STOCK]"
      [(dragging)]="dragging"
      (toFoundation)="toFoundation($event.from, $event.card)"
      (save)="moves.push({...$event, flipped: false})"
    ></app-stock>
    <div class="empty_space"></div>
    <div class="foundations">
      @for (foundation of FOUNDATIONS; track foundation) {
        <app-foundation
          [id]="foundation"
          [cards]="playingCards[foundation]"
          [(dragging)]="dragging"
          (dropped)="drop($event, dragging())"
        ></app-foundation>
      }
    </div>
  </div>
  <div class="card_row bottom">
    @for (pile of PILES; track pile) {
      <app-pile
        [id]="pile"
        [cards]="playingCards[pile]"
        [(dragging)]="dragging"
        (dropped)="drop($event, dragging())"
        (toFoundation)="toFoundation($event.from, $event.card)"
      ></app-pile>
    }
  </div>
</div>
<div
  id="finish-overlay"
  [style.display]="finish() ? 'block' : 'none'"
  (click)="finish.set(false); newGame()"
>
  <div id="finish">You won!</div>
</div>
