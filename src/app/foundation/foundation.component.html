<div class="pile" (drop)="canPlace() && dropped.emit(id())" (dragover)="$event.preventDefault()">
  <div class="bottom"></div>
  @for (card of cards().reverse(); track $index) {
    <app-card
      [card]="card"
      [draggable]="$last"
      (dragstart)="dragstart()"
      (dragend)="dragging.set(undefined)"
    ></app-card>
  }
</div>
